<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notes | Ahmad Alimin</title>
    <link rel="icon" type="image/png" href="favicon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="global.css" />
</head>

<body class="bg-background font-body text-on-surface overflow-x-hidden">
    <div id="header-placeholder"></div>

    <main class="pt-32 pb-24 min-h-screen">
        <section class="max-w-7xl mx-auto px-6 md:px-8 mb-20 reveal">
            <span class="text-primary font-bold tracking-widest text-xs uppercase mb-4 block">Labyrinth of
                Thoughts</span>
            <h1
                class="font-headline text-5xl md:text-8xl font-extrabold text-slate-900 dark:text-white leading-tight mb-8">
                NOTES<span class="text-primary">.</span>
            </h1>
            <p class="text-on-surface-variant text-lg max-w-2xl leading-relaxed italic">
                A digital garden where I plant raw ideas, technical snippets, and philosophical fragments.
            </p>
        </section>

        <!-- Notes Grid -->
        <section class="max-w-7xl mx-auto px-6 md:px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Empty State / Placeholder -->
            <div
                class="col-span-full py-32 flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/20 rounded-3xl group hover:border-primary/40 transition-all">
                <div
                    class="w-20 h-20 bg-primary/5 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-4xl text-primary/30">edit_note</span>
                </div>
                <h3 class="text-xl font-bold text-slate-400 mb-2 font-headline">Syncing Thoughts...</h3>
                <p class="text-slate-400 text-sm italic">The ink is still wet. Check back soon for the first entry.</p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="main.js"></script>
</body>

</html>
